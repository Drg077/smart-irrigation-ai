<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgriMind Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
    margin: 0;
    padding: 25px;
}

.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 25px;
}

.cards {
    display: flex;
    gap: 20px;
}

.card {
    flex: 1;
    background: rgba(255,255,255,0.8);
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.grid {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 14px;
    flex: 1;
    min-width: 250px;
}

.badge {
    background: #c8e6c9;
    padding: 6px 12px;
    border-radius: 20px;
    display: inline-block;
    margin-top: 10px;
}

.alert {
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
}

.green { background: #e8f5e9; }
.orange { background: #fff3e0; }

.inputs {
    margin: 25px 0;
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    align-items: flex-end;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.input-group label {
    font-size: 13px;
    font-weight: 600;
    color: #555;
}

input, button {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    background: #2e7d32;
    color: white;
    cursor: pointer;
    font-weight: bold;
    padding: 10px 20px;
    border: none;
    transition: background 0.3s;
}

button:hover {
    background: #1b5e20;
}

/* ── Floating chatbot button ─────────────────────────────────────────── */
#chat-fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2e7d32, #66bb6a);
    box-shadow: 0 6px 24px rgba(46,125,50,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1000;
    border: none;
    transition: transform 0.2s, box-shadow 0.2s;
}
#chat-fab:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 28px rgba(46,125,50,0.55);
}
#chat-fab svg { width: 28px; height: 28px; fill: white; }

/* Pulse ring */
#chat-fab::after {
    content: '';
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 2px solid #66bb6a;
    animation: pulse-ring 2s ease-out infinite;
}
@keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: 0.6; }
    100% { transform: scale(1.55); opacity: 0; }
}

/* ── Chat panel ──────────────────────────────────────────────────────── */
#chat-panel {
    position: fixed;
    bottom: 100px;
    right: 28px;
    width: 340px;
    max-height: 480px;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    z-index: 999;
    overflow: hidden;
    transform: scale(0.85) translateY(20px);
    opacity: 0;
    pointer-events: none;
    transform-origin: bottom right;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.2s ease;
}
#chat-panel.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
}

/* Header */
#chat-header {
    background: linear-gradient(135deg, #2e7d32, #66bb6a);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
}
#chat-header .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
}
#chat-header .info { flex: 1; }
#chat-header .info strong { display: block; font-size: 14px; }
#chat-header .info span { font-size: 11px; opacity: 0.85; }
#chat-close {
    background: none; border: none; color: white;
    font-size: 20px; cursor: pointer; padding: 0 4px;
    line-height: 1;
}
#chat-close:hover { opacity: 0.7; }

/* Messages */
#chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f9fbe7;
}
.msg {
    max-width: 82%;
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.45;
    word-break: break-word;
}
.msg.bot {
    background: #e8f5e9;
    color: #1b5e20;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}
.msg.user {
    background: #2e7d32;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}
.msg-time {
    font-size: 10px;
    color: #aaa;
    margin-top: 2px;
    text-align: right;
}

/* Typing indicator */
.typing { display: flex; gap: 4px; align-items: center; padding: 10px 13px; }
.typing span {
    width: 7px; height: 7px;
    background: #81c784; border-radius: 50%;
    animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%            { transform: translateY(-6px); }
}

/* Input area */
#chat-input-area {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid #e8f5e9;
    background: white;
}
#chat-input {
    flex: 1;
    border: 1px solid #c8e6c9;
    border-radius: 22px;
    padding: 9px 14px;
    font-size: 13px;
    outline: none;
    resize: none;
    font-family: inherit;
}
#chat-input:focus { border-color: #66bb6a; }
#chat-send {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: #2e7d32;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0; flex-shrink: 0;
    transition: background 0.2s;
}
#chat-send:hover { background: #1b5e20; }
#chat-send svg { width: 16px; height: 16px; fill: white; }

/* Quick replies */
.quick-replies {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 14px 10px;
    background: #f9fbe7;
}
.qr-btn {
    background: white;
    border: 1px solid #a5d6a7;
    color: #2e7d32;
    border-radius: 16px;
    padding: 5px 11px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
    font-weight: 500;
}
.qr-btn:hover { background: #e8f5e9; }
</style>
</head>

<body>

<h2>🌱 AgriMind Dashboard</h2>

<div class="cards">
    <div class="card"><small>SOIL MOISTURE</small><h2 id="soil_moisture_display">--</h2></div>
    <div class="card"><small>TEMPERATURE</small><h2 id="temperature_display">--</h2></div>
    <div class="card"><small>SOIL HEALTH</small><h2 id="health_display">--</h2></div>
    <div class="card"><small>HUMIDITY</small><h2 id="humidity_display">--</h2></div>
</div>

<div style="display: flex; gap: 20px; flex-wrap: wrap; margin: 25px 0;">
    <div style="flex: 2; background: white; padding: 20px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-width: 300px;">
        <h3 style="margin-top: 0; color: #2e7d32; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px;">🌾 Crop Parameters</h3>
        <div class="inputs" style="margin: 15px 0 0 0;">
            <div class="input-group">
                <label>Nitrogen (N)</label>
                <input type="number" id="N" placeholder="e.g. 90">
            </div>
            <div class="input-group">
                <label>Phosphorous (P)</label>
                <input type="number" id="P" placeholder="e.g. 42">
            </div>
            <div class="input-group">
                <label>Potassium (K)</label>
                <input type="number" id="K" placeholder="e.g. 43">
            </div>
            <div class="input-group">
                <label>Humidity (%)</label>
                <input type="number" step="0.1" id="humidity" placeholder="e.g. 80">
            </div>
            <div class="input-group">
                <label>pH Level</label>
                <input type="number" step="0.1" id="ph" placeholder="e.g. 6.5">
            </div>
            <div class="input-group">
                <label>Rainfall (mm)</label>
                <input type="number" step="0.1" id="rainfall" placeholder="e.g. 200">
            </div>
        </div>
    </div>

    <div style="flex: 1; background: white; padding: 20px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-width: 250px;">
        <h3 style="margin-top: 0; color: #0288d1; border-bottom: 2px solid #e1f5fe; padding-bottom: 10px;">💧 Irrigation Parameters</h3>
        <div class="inputs" style="margin: 15px 0 0 0; flex-direction: column; align-items: stretch;">
            <div class="input-group">
                <label>Soil Moisture</label>
                <input type="number" id="soil_moisture" placeholder="e.g. 500">
            </div>
            <div class="input-group">
                <label>Temperature (°C)</label>
                <input type="number" step="0.1" id="temperature" placeholder="e.g. 24">
            </div>
            <div style="margin-top: auto; padding-top: 20px; display: flex; justify-content: flex-end;">
                <button onclick="predict()" style="width: 100%; font-size: 16px; padding: 12px 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(46,125,50,0.3);">Predict Action</button>
            </div>
        </div>
    </div>
</div>

<div class="grid">
    <div class="box">
        <h3>Recommended Crop</h3>
        <h2 id="crop_result" style="text-transform: capitalize;">--</h2>
        <div class="badge" id="crop_badge">Awaiting Data</div>
    </div>
    
    <div class="box">
        <h3>Irrigation Decision</h3>
        <h2 id="result">--</h2>
        <div class="badge" id="badge">Awaiting Data</div>
    </div>

    <div class="box">
        <h3>Alerts</h3>
        <div id="alerts">
            <div class="alert green">Ready for prediction.</div>
        </div>
    </div>
</div>

<div class="grid">
    <div class="box">
        <h3>Soil Moisture Trend</h3>
        <canvas id="chart"></canvas>
    </div>
</div>

<!-- ── Floating chatbot button ────────────────────────────────────────── -->
<button id="chat-fab" onclick="toggleChat()" title="AgriBot Assistant">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-2 10H6v-2h12v2zm0-3H6V7h12v2z"/>
    </svg>
</button>

<!-- ── Chat panel ─────────────────────────────────────────────────────── -->
<div id="chat-panel">
    <div id="chat-header">
        <div class="avatar">🌿</div>
        <div class="info">
            <strong>AgriBot</strong>
            <span>🟢 Online — Farm Assistant</span>
        </div>
        <button id="chat-close" onclick="toggleChat()">✕</button>
    </div>

    <div id="chat-messages"></div>

    <div class="quick-replies" id="quick-replies">
        <button class="qr-btn" onclick="sendQuick('What crop should I grow?')">🌾 Best crop?</button>
        <button class="qr-btn" onclick="sendQuick('When should I irrigate?')">💧 Irrigation?</button>
        <button class="qr-btn" onclick="sendQuick('What does pH level mean?')">🧪 pH info</button>
        <button class="qr-btn" onclick="sendQuick('How to improve soil health?')">🌱 Soil health</button>
    </div>

    <div id="chat-input-area">
        <textarea id="chat-input" placeholder="Ask about crops, soil, irrigation…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button id="chat-send" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
// ── All original logic — untouched ────────────────────────────────────────
let chart;
let moistureHistory = [];
let labels = [];

async function predict() {
    const N = document.getElementById("N").value;
    const P = document.getElementById("P").value;
    const K = document.getElementById("K").value;
    const ph = document.getElementById("ph").value;
    const rainfall = document.getElementById("rainfall").value;
    const soil_moisture = document.getElementById("soil_moisture").value;
    const temperature = document.getElementById("temperature").value;
    const humidity = document.getElementById("humidity").value;

    if (!N || !P || !K || !ph || !rainfall || !soil_moisture || !temperature || !humidity) {
        alert("Please enter all required numeric values.");
        return;
    }

    const n_val = Number(N);
    const p_val = Number(P);
    const k_val = Number(K);
    const ph_val = Number(ph);
    const rain_val = Number(rainfall);
    const soil_val = Number(soil_moisture);
    const temp_val = Number(temperature);
    const hum_val = Number(humidity);

    document.getElementById("soil_moisture_display").innerText = soil_val;
    document.getElementById("temperature_display").innerText = temp_val + "°C";
    document.getElementById("humidity_display").innerText = hum_val + "%";

    const health = Math.min(100, Math.round(soil_val + hum_val/2));
    document.getElementById("health_display").innerText = health;

    try {
        const res = await fetch("http://127.0.0.1:10000/predict_all", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                N: n_val, P: p_val, K: k_val, ph: ph_val,
                rainfall: rain_val, soil_moisture: soil_val,
                temperature: temp_val, humidity: hum_val
            })
        });

        const data = await res.json();

        if (data.recommended_crop) {
            document.getElementById("crop_result").innerText = data.recommended_crop;
            document.getElementById("crop_badge").innerText = "Best Match";
            document.getElementById("crop_badge").style.backgroundColor = "#81c784";
        }

        if (data.irrigation === "YES") {
            document.getElementById("result").innerText = "Irriagtion Needed";
            document.getElementById("badge").innerText = "Action Required";
            document.getElementById("badge").style.backgroundColor = "#ffcc80";
        } else {
            document.getElementById("result").innerText = "Water Not Needed";
            document.getElementById("badge").innerText = "Optimal Level";
            document.getElementById("badge").style.backgroundColor = "#c8e6c9";
        }

        generateAlerts(soil_val, temp_val, hum_val);
        updateChart(soil_val);

    } catch (e) {
        alert("API error: Could not reach the server.");
        console.error(e);
    }
}

function generateAlerts(soil_moisture, temperature, humidity) {
    const div = document.getElementById("alerts");
    div.innerHTML = "";

    // -------- Soil Moisture (MAIN FACTOR) --------
    if (soil_moisture > 3000) {
        div.innerHTML += `<div class="alert orange">🚨 Soil is very dry — irrigation needed immediately</div>`;
    } 
    else if (soil_moisture > 2000) {
        div.innerHTML += `<div class="alert orange">⚠️ Soil is moderately dry</div>`;
    } 
    else if (soil_moisture < 800) {
        div.innerHTML += `<div class="alert orange">💧 Soil is too wet — avoid irrigation</div>`;
    } 
    else {
        div.innerHTML += `<div class="alert green">✅ Soil moisture is optimal</div>`;
    }

    // -------- Combined Smart Alerts --------

    // Dry + Hot
    if (soil_moisture > 2000 && temperature > 32) {
        div.innerHTML += `<div class="alert orange">🔥 High temperature + dry soil → rapid moisture loss</div>`;
    }

    // Dry + Low humidity
    if (soil_moisture > 2000 && humidity < 40) {
        div.innerHTML += `<div class="alert orange">🌬️ Dry air + dry soil → irrigation strongly recommended</div>`;
    }

    // Wet + High humidity
    if (soil_moisture < 800 && humidity > 80) {
        div.innerHTML += `<div class="alert orange">🌧️ Excess moisture + humidity → risk of fungal diseases</div>`;
    }

    // Temperature alerts
    if (temperature > 35) {
        div.innerHTML += `<div class="alert orange">🌡️ Extreme heat — crops under stress</div>`;
    } 
    else if (temperature < 10) {
        div.innerHTML += `<div class="alert orange">❄️ Low temperature — growth may slow</div>`;
    }

    // Humidity alerts
    if (humidity < 30) {
        div.innerHTML += `<div class="alert orange">💨 Very low humidity — evaporation rate high</div>`;
    } 
    else if (humidity > 90) {
        div.innerHTML += `<div class="alert orange">🌫️ Very high humidity — disease risk</div>`;
    }

    // Final fallback
    if (div.innerHTML === "") {
        div.innerHTML = `<div class="alert green">✅ All conditions are ideal for crop growth</div>`;
    }
}

function updateChart(value) {
    const ctx = document.getElementById('chart').getContext('2d');

    if (moistureHistory.length >= 7) {
        moistureHistory.shift();
        labels.shift();
    }

    moistureHistory.push(value);
    labels.push(new Date().toLocaleTimeString());

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Soil Moisture',
                data: moistureHistory,
                borderColor: '#2e7d32',
                backgroundColor: 'rgba(46, 125, 50, 0.1)',
                tension: 0.4,
                fill: true
            }]
        }
    });
}

// ── Chatbot logic ─────────────────────────────────────────────────────────
let chatOpen = false;
let greetedOnce = false;

const BOT_RESPONSES = {
    // Crops
    "crop":        "🌾 The best crop depends on your N, P, K, pH and rainfall values. Run a prediction above to get an AI-recommended crop for your conditions!",
    "grow":        "🌱 Enter your soil and weather data above, then click <strong>Predict Action</strong> to see which crop suits your field best.",
    "rice":        "🍚 Rice thrives in high humidity (80–90%), warm temperatures (22–30°C), and high rainfall (>200mm). Ensure soil moisture is adequate.",
    "wheat":       "🌾 Wheat prefers cooler temperatures (15–20°C), moderate rainfall, and a pH of 6–7. Low-to-medium nitrogen works well.",
    "maize":       "🌽 Maize needs warm temperatures (20–30°C), moderate moisture, and high nitrogen. Ensure good drainage.",

    // Irrigation
    "irrigat":     "💧 Irrigation is needed when soil moisture drops below 400. Your dashboard shows real-time recommendations after prediction.",
    "water":       "💧 Check your soil moisture reading. Below 400 = irrigate; above 650 = too much water. The dashboard alerts you automatically.",

    // Soil
    "ph":          "🧪 pH measures soil acidity. Most crops prefer 6.0–7.5. Low pH = add lime. High pH = add sulfur or organic matter.",
    "nitrogen":    "🟢 Nitrogen (N) fuels leaf and stem growth. Typical range: 40–140 kg/ha. Too little = yellow leaves; too much = excess foliage.",
    "phosphor":    "🟠 Phosphorus (P) supports root development and flowering. Ideal range: 20–80 kg/ha.",
    "potassium":   "🟡 Potassium (K) strengthens disease resistance and fruit quality. Range: 15–100 kg/ha.",
    "soil health": "🌍 Soil health score is calculated from moisture + humidity. Aim for 60–80 for optimal conditions.",
    "soil":        "🌱 Healthy soil has balanced N, P, K, good pH (6–7.5), adequate moisture (400–650), and proper drainage.",
    "fertiliz":    "🧴 Use NPK fertilizer based on your soil test. Add nitrogen for leafy crops, phosphorus for root crops, potassium for fruiting crops.",

    // Weather
    "temperatur":  "🌡️ Most crops grow best between 15–30°C. Above 35°C causes heat stress. Below 10°C can slow growth significantly.",
    "humidity":    "💨 Ideal humidity for most crops is 50–80%. Below 40% causes drought stress; above 90% encourages fungal disease.",
    "rainfall":    "🌧️ Annual rainfall needs vary: rice needs 150–300mm/season, wheat 75–150mm, maize 500–800mm total.",

    // Help / fallback
    "hello":       "👋 Hello! I'm AgriBot. Ask me about crops, soil health, irrigation, pH, or fertilizers!",
    "hi":          "👋 Hi there! How can I help with your farm today?",
    "help":        "🤖 I can help with:\n• Crop recommendations\n• Irrigation timing\n• Soil health & pH\n• NPK fertilizers\n• Temperature & humidity\n\nJust ask!",
    "thank":       "😊 Happy to help! Good luck with your harvest! 🌾",
};

function getBotReply(msg) {
    const lower = msg.toLowerCase();
    for (const [key, reply] of Object.entries(BOT_RESPONSES)) {
        if (lower.includes(key)) return reply;
    }
    return "🤔 I'm not sure about that. Try asking about <strong>crops, irrigation, soil pH, NPK values, temperature,</strong> or <strong>humidity</strong>!";
}

function toggleChat() {
    chatOpen = !chatOpen;
    const panel = document.getElementById('chat-panel');
    panel.classList.toggle('open', chatOpen);

    if (chatOpen && !greetedOnce) {
        greetedOnce = true;
        setTimeout(() => addMessage('bot', "👋 Hi! I'm <strong>AgriBot</strong>, your farm assistant. Ask me about crops, soil, irrigation, or fertilizers!"), 300);
    }
}

function addMessage(role, html) {
    const msgs = document.getElementById('chat-messages');
    const now  = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = role === 'user' ? 'flex-end' : 'flex-start';

    const bubble = document.createElement('div');
    bubble.className = `msg ${role}`;
    bubble.innerHTML = html;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = now;

    wrapper.appendChild(bubble);
    wrapper.appendChild(time);
    msgs.appendChild(wrapper);
    msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
    const msgs = document.getElementById('chat-messages');
    const el = document.createElement('div');
    el.id = 'typing-indicator';
    el.className = 'msg bot typing';
    el.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
}

async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    input.value = '';

    document.getElementById('quick-replies').style.display = 'none';

    showTyping();

    try {
        const res = await fetch("http://127.0.0.1:10000/api/chatbot/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: text })
        });

        const data = await res.json();

        removeTyping();
        addMessage('bot', data.response);

    } catch (err) {
        removeTyping();
        addMessage('bot', "⚠️ Server error");
        console.error(err);
    }
}

function sendQuick(text) {
    document.getElementById('chat-input').value = text;
    sendMessage();
}
</script>
